name: Docs

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  docs:
    name: Build Docs
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra docs

      - name: Build docs
        run: uv run sphinx-build -W -b html docs docs/build/html
