key: internal.dittus_boelter
family: convection_internal
title: "Dittus-Boelter (1930)"
output: Nu
formula_latex: "Nu = 0.023 \\cdot Re^{0.8} \\cdot Pr^n, \\quad n = 0.4 \\text{ (heating)}, \\; 0.3 \\text{ (cooling)}"
flow_regime: turbulent
boundary_conditions: [constant_heat_flux, constant_wall_temperature]
required_inputs: [Reynolds, Prandtl]
validity:
  geometry_type: circular_tube
  re_min: 10000
  re_max: 120000
  pr_min: 0.6
  pr_max: 160
  ld_min: 10
  notes: >
    Fully developed turbulent flow, 10000 <= Re_D <= 1.2e5, 0.6 <= Pr <= 160, L/D >= 10.
    Re range 10000-120000 per McAdams (1954) who established the textbook form of this
    correlation; Incropera 7th ed. Eq 8.60 gives Re_D >= 10000 with no explicit upper bound.
    Pr lower bound corrected to 0.6 per Incropera 7th ed. Eq 8.60 (was 0.7).
literature_uncertainty_pct: 25
assumptions:
  - "Smooth circular tube, fully developed turbulent flow"
  - "Fluid properties evaluated at bulk mean temperature"
  - "$n = 0.4$ when fluid is being heated ($T_{wall} > T_{bulk}$); $n = 0.3$ when cooling"
  - "Not recommended for 2300 < Re < 10000 (transitional regime)"
  - "Large property variation (especially viscosity) not accounted for; use Sieder-Tate instead"
source:
  authors: ["Dittus, F.W.", "Boelter, L.M.K."]
  year: 1930
  title: "Heat Transfer in Automobile Radiators of the Tubular Type"
  journal: "University of California Publications in Engineering"
  volume: 2
  issue: 13
  pages: "443-461"
  doi: ""
  url: ""
notes:
  - "Reprinted in Int. Comm. Heat Mass Transfer, Vol. 12, pp. 3-22, 1985. DOI: 10.1016/0735-1933(85)90003-X"
  - "Known to have ±25% error — UNCERTAIN: the ±25% figure is attributed to textbooks (Incropera 7th ed. Eq. 8.60, p. 514; Cengel 5th ed. Eq. 8-55). The 1930 original publication is not available in any accessible form; the 1985 reprint (ICHMT 12:3-22, DOI 10.1016/0735-1933(85)90003-X) is paywalled. Cannot be verified against primary source."
  - "Gnielinski (1976) preferred for 3000 < Re < 10000"
  - "Widely used despite large uncertainty due to simplicity"
  - "Original 1930 publication is a UC Berkeley technical report, not a journal article"
