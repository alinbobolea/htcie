key: external.hilpert
family: convection_external
title: "Hilpert (1933)"
output: Nu
formula_latex: >
  Nu = C \cdot Re^{m} \cdot Pr^{1/3}
flow_regime: all
boundary_conditions: [constant_wall_temperature]
required_inputs: [Reynolds, Prandtl]
validity:
  geometry_type: cylinder_crossflow
  re_min: 0.4
  re_max: 400000
  pr_min: 0.7
  notes: "C and m are tabular constants dependent on Re range; properties at film temperature"
literature_uncertainty_pct: 20  # UNCERTAIN: see note below; primary source unavailable
assumptions:
  - "Isothermal cylinder in crossflow"
  - "Fluid properties evaluated at film temperature"
  - "Prandtl number approximately 0.7 (gases); $Pr^{1/3}$ factor accounts for moderate Pr variation"
source:
  authors: ["Hilpert, R."]
  year: 1933
  title: "Wärmeabgabe von geheizten Drähten und Rohren im Luftstrom"
  journal: "Forschung auf dem Gebiet des Ingenieurwesens"
  volume: 4
  issue: 5
  pages: "215-224"
  doi: "10.1007/BF02715487"
  url: ""
notes:
  - "Tabular C and m constants by Re range: Re 0.4-4: C=0.989, m=0.330; Re 4-40: C=0.911, m=0.385; Re 40-4000: C=0.683, m=0.466; Re 4000-40000: C=0.193, m=0.618; Re 40000-400000: C=0.027, m=0.805"
  - "Classic German-language paper; original paywalled at Springer (DOI: 10.1007/BF02715487)"
  - "Fand and Keswani corrigendum available: DOI 10.1115/1.3450030"
  - "Superseded by Churchill-Bernstein (1977) for wider Re and Pr coverage"
  - "RE RANGE NOTE: The Hilpert (1933) paper experimental data covered Re = 2.1 to 231,000 in airflow (per references.yaml). The YAML re_min = 0.4 and re_max = 400,000 follow Incropera Table 7.1 which incorporates Fand & Keswani (1973) recalculated constants (J. Heat Transfer 95:224, DOI 10.1115/1.3450030). The extension of C,m constants to Re 0.4-4 and Re 40,000-400,000 is based on the Fand-Keswani recalculation, not direct Hilpert (1933) data. The original Hilpert paper is paywalled (Springer, DOI 10.1007/BF02719754)."
  - "UNCERTAINTY NOTE: The ±20% figure is a textbook-consensus estimate. The original paper (Hilpert 1933, German) is not available; the ±20% cannot be verified against the primary source."
