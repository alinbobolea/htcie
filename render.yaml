# Render.com Blueprint — deploy htcie GUI only (free tier)
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: htcie-gui
    runtime: python
    buildCommand: pip install -e .
    startCommand: htcie-gui
    envVars:
      - key: HTCIE_DATA_DIR
        value: data/correlations
      - key: NICEGUI_STORAGE_SECRET
        generateValue: true